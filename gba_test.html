<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>GBA Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;flex-direction:column;align-items:center;min-height:100vh;color:#fff;font-family:sans-serif}
#screen{display:block;image-rendering:pixelated;width:100%;max-width:480px;background:#000;aspect-ratio:3/2}
#status{padding:8px;font-size:12px;color:#aaa;text-align:center;min-height:30px}
.row{display:flex;gap:8px;padding:4px 8px;justify-content:center;align-items:center;width:100%}
.btn{padding:14px 18px;background:#333;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}
.btn:active{background:#555}
.btn-a{background:#CC0000}
.btn-b{background:#555}
.btn-load{background:#FFCB05;color:#000;font-weight:bold;padding:14px;width:90%;max-width:300px;border-radius:10px;border:none;font-size:15px;cursor:pointer;display:block;text-align:center}
</style>
</head>
<body>

<canvas id="screen" width="240" height="160"></canvas>
<div id="status">⏳ Chargement émulateur...</div>

<div class="row">
  <label class="btn-load">📁 Charger ROM GBA
    <input type="file" accept="*/*" id="rom-input" style="display:none">
  </label>
</div>

<div class="row">
  <button class="btn" id="btn-l">L</button>
  <button class="btn" id="dpad-u">▲</button>
  <button class="btn" id="dpad-l">◀</button>
  <button class="btn" id="dpad-d">▼</button>
  <button class="btn" id="dpad-r">▶</button>
  <button class="btn" id="btn-r">R</button>
</div>
<div class="row">
  <button class="btn" id="btn-select">SELECT</button>
  <button class="btn" id="btn-start">START</button>
  <button class="btn btn-b" id="btn-b">B</button>
  <button class="btn btn-a" id="btn-a">A</button>
</div>

<!-- gbajs2 depuis jsDelivr GitHub -->
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/util.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/core.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/arm.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/thumb.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/mmu.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/io.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/audio.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/video.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/video/proxy.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/video/software.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/irq.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/keypad.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/sio.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/savedata.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/gpio.js"></script>
<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/gba.js"></script>

<script>
window.addEventListener('load', function() {
  if (typeof GameBoyAdvance !== 'undefined') {
    document.getElementById('status').textContent = '✅ Prêt — charge une ROM GBA';
  } else {
    document.getElementById('status').textContent = '❌ Erreur chargement émulateur';
  }
});

let gba = null;

// Charge le BIOS au démarrage
fetch('./gba_bios.bin')
  .then(r => r.arrayBuffer())
  .then(bios => {
    window._gbaBios = bios;
    document.getElementById('status').textContent = '✅ Prêt — charge une ROM GBA';
  })
  .catch(() => {
    document.getElementById('status').textContent = '⚠️ BIOS non trouvé — charge la ROM quand même';
  });

document.getElementById('rom-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('status').textContent = '⏳ ' + file.name + '...';
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      if (gba) { try{gba.pause();}catch(x){} gba = null; }
      gba = new GameBoyAdvance();
      gba.setCanvas(document.getElementById('screen'));
      gba.logLevel = gba.LOG_ERROR;
      // Charge le BIOS si disponible
      if (window._gbaBios) {
        gba.setBios(window._gbaBios, false);
      }
      if (gba.setRom(ev.target.result)) {
        gba.runStable();
        document.getElementById('status').textContent = '🎮 ' + file.name;
      } else {
        document.getElementById('status').textContent = '❌ ROM invalide';
      }
    } catch(err) {
      document.getElementById('status').textContent = '❌ ' + err.message;
    }
  };
  reader.readAsArrayBuffer(file);
});

const keys = {
  'btn-a':0,'btn-b':1,'btn-select':2,'btn-start':3,
  'dpad-r':4,'dpad-l':5,'dpad-u':6,'dpad-d':7,'btn-r':8,'btn-l':9
};
Object.entries(keys).forEach(([id,k]) => {
  const el = document.getElementById(id);
  if (!el) return;
  const dn = e => { e.preventDefault(); if(gba&&gba.keypad) gba.keypad.keydown(k); };
  const up = e => { e.preventDefault(); if(gba&&gba.keypad) gba.keypad.keyup(k); };
  el.addEventListener('touchstart',dn,{passive:false});
  el.addEventListener('touchend',up,{passive:false});
  el.addEventListener('mousedown',dn);
  el.addEventListener('mouseup',up);
});
</script>
</body>
</html>
