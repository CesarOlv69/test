<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>GBA Test</title>
<style>
body{margin:0;background:#000;display:flex;flex-direction:column;align-items:center;height:100vh;overflow:hidden}
canvas{display:block;image-rendering:pixelated;width:100%;max-width:480px}
.controls{display:flex;flex-wrap:wrap;gap:8px;padding:8px;justify-content:center}
button{padding:12px 20px;background:#333;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
#file-btn{background:#FFCB05;color:#000;font-weight:bold;width:100%;max-width:300px;padding:14px}
</style>
</head>
<body>
<canvas id="screen" width="240" height="160"></canvas>
<div class="controls">
  <label id="file-btn">📁 Charger ROM GBA
    <input type="file" accept="*/*" id="rom-file" style="display:none">
  </label>
  <button id="btn-start">START</button>
  <button id="btn-select">SELECT</button>
</div>
<div class="controls">
  <button id="btn-l">L</button>
  <button id="dpad-up">▲</button>
  <button id="btn-r">R</button>
</div>
<div class="controls">
  <button id="dpad-left">◀</button>
  <button id="dpad-center" style="background:#111">·</button>
  <button id="dpad-right">▶</button>
</div>
<div class="controls">
  <button id="dpad-down">▼</button>
</div>
<div class="controls">
  <button id="btn-b" style="background:#444">B</button>
  <button id="btn-a" style="background:#CC0000">A</button>
</div>

<script src="https://cdn.jsdelivr.net/gh/andychase/gbajs2@master/js/core/gba.js"></script>
<script>
let gba = null;

document.getElementById('rom-file').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const canvas = document.getElementById('screen');
    if (gba) {
      gba.pause();
      gba = null;
    }
    gba = new GameBoyAdvance();
    gba.setCanvas(canvas);
    gba.setBios(null);
    gba.setRom(ev.target.result);
    gba.runStable();
  };
  reader.readAsArrayBuffer(file);
});

// Key mapping
const keyMap = {
  'btn-a': 0, 'btn-b': 1, 'btn-select': 2, 'btn-start': 3,
  'dpad-right': 4, 'dpad-left': 5, 'dpad-up': 6, 'dpad-down': 7,
  'btn-r': 8, 'btn-l': 9
};

Object.keys(keyMap).forEach(id => {
  const btn = document.getElementById(id);
  if (!btn) return;
  const key = keyMap[id];
  btn.addEventListener('touchstart', e => { e.preventDefault(); if(gba) gba.keypad.keydown(key); }, {passive:false});
  btn.addEventListener('touchend', e => { e.preventDefault(); if(gba) gba.keypad.keyup(key); }, {passive:false});
  btn.addEventListener('mousedown', () => { if(gba) gba.keypad.keydown(key); });
  btn.addEventListener('mouseup', () => { if(gba) gba.keypad.keyup(key); });
});
</script>
</body>
</html>
